services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set-in-Coolify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-in-Coolify}
      POSTGRES_DB: ${POSTGRES_DB:?set-in-Coolify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./web
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set-in-Coolify}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set-in-Coolify}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set-in-Coolify}
      RESEND_API_KEY: ${RESEND_API_KEY:?set-in-Coolify}
      FROM_EMAIL: ${FROM_EMAIL:?set-in-Coolify}
      CRON_SECRET: ${CRON_SECRET:?set-in-Coolify}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
